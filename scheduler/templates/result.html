<!DOCTYPE html>
<html>
<head>
<title>Results</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">

<h1 class="text-center">📊 Results</h1>

<div class="row">

<div class="col-md-4">
<div class="card bg-primary p-3">
<h3>FCFS</h3>
{% for p in fcfs %}
<p>P{{p.id}} : {{p.waiting}}</p>
{% endfor %}
<h5>Avg: {{fcfs_avg}}</h5>
</div>
</div>

<div class="col-md-4">
<div class="card bg-success p-3">
<h3>SJF</h3>
{% for p in sjf %}
<p>P{{p.id}} : {{p.waiting}}</p>
{% endfor %}
<h5>Avg: {{sjf_avg}}</h5>
</div>
</div>

<div class="col-md-4">
<div class="card bg-warning p-3 text-dark">
<h3>Round Robin</h3>
{% for p in rr %}
<p>P{{p.id}} : {{p.waiting}}</p>
{% endfor %}
<h5>Avg: {{rr_avg}}</h5>
</div>
</div>

</div>

<div class="text-center mt-4">
<h2 class="text-success">🏆 Best: {{best}}</h2>
<a href="/" class="btn btn-light">Back</a>
</div>

</div>

</body>
</html>
